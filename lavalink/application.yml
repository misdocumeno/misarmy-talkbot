server:
  port: 2333
  address: 0.0.0.0
  http2:
    enabled: false

lavalink:
  plugins: []
  pluginsDir: "./plugins"
  defaultPluginRepository: "https://maven.lavalink.dev/releases"
  defaultPluginSnapshotRepository: "https://maven.lavalink.dev/snapshots"
  server:
    password: "${LAVALINK_PASSWORD:youshallnotpass}"
    sources:
      # Local files are how the bot hands generated TTS audio to Lavalink. Both
      # containers share the audio tmpfs volume so file:// URIs resolve here.
      local: true
      youtube: false
      bandcamp: false
      soundcloud: false
      twitch: false
      vimeo: false
      nico: false
      http: false
    filters:
      timescale: true
      volume: true
      equalizer: false
      karaoke: false
      tremolo: false
      vibrato: false
      distortion: false
      rotation: false
      channelMix: false
      lowPass: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    playerUpdateInterval: 5
    youtubeSearchEnabled: false
    soundcloudSearchEnabled: false
    gc-warnings: true

metrics:
  prometheus:
    enabled: false

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/

  level:
    root: INFO
    lavalink: INFO

  request:
    enabled: false

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
